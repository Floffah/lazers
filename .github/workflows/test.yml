name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-uefi,x86_64-unknown-none
      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install just
        run: cargo install just --locked

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dosfstools \
            gdisk \
            imagemagick \
            mtools \
            ovmf \
            qemu-system-x86 \
            qemu-utils

      - name: Run test suite
        run: just test

      - name: Upload selftest log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selftest-serial-log
          path: build/selftest-serial.log
          if-no-files-found: ignore
